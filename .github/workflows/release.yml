name: Release

# Two ways to cut a release:
#   1. Push a version tag:   git tag v0.1.0 && git push origin v0.1.0
#   2. Actions tab -> Release -> "Run workflow", enter a version (e.g. v0.1.0);
#      the workflow creates and pushes the tag for you.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.v.outputs.version }}"
          git push origin "${{ steps.v.outputs.version }}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = windows ] && ext=".exe"
            echo "building ${os}/${arch}"
            GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" \
              -o "dist/gl-tftpd-${os}-${arch}${ext}" .
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.v.outputs.version }}" dist/* --generate-notes
